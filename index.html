<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To-Do List | Drive Sync</title>
    <link href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,700" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    </head>
<body>

<div id="container">
    <h1>To-Do List <i class="fa fa-plus" title="Toggle Input"></i></h1>
    
    <input type="text" id="todo-input" placeholder="Add New Task..." style="display: none;">
    
    <ul id="todo-list">
        <li><span><i class="fa fa-trash-o"></i></span>Sample Task</li>
    </ul>

    <div class="file-upload">
        <h3><i class="fa fa-cloud-upload"></i> Google Drive Sync</h3>
        <p class="file-info">Upload logs or attachments directly.</p>
        
        <div class="upload-controls">
            <input type="file" id="todo-file">
            <label for="todo-file" id="file-label">Choose File</label>
            <button id="upload-btn">Upload</button>
        </div>
        
        <div id="upload-status"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>
<script>
$(document).ready(function(){
    // --- TASK LOGIC ---
    // Toggle Input
    $('.fa-plus').click(function(){
        $('#todo-input').fadeToggle(200);
    });

    // Add Task
    $('#todo-input').keypress(function(event){
        if(event.which === 13){
            let todoText = $(this).val();
            if(todoText.trim() !== ''){
                $('#todo-list').append('<li><span><i class="fa fa-trash-o"></i></span> ' + todoText + '</li>');
                $(this).val('');
            }
        }
    });

    // Delete Task
    $('#todo-list').on('click', 'span', function(e){
        $(this).parent().fadeOut(300, function(){
            $(this).remove();
        });
        e.stopPropagation();
    });

    // Toggle Completed
    $('#todo-list').on('click', 'li', function(){
        $(this).toggleClass('completed');
    });
    
    // --- DRIVE UPLOAD LOGIC ---
    $('#todo-file').change(function() {
        let filename = $(this).val().split('\\').pop();
        $('#file-label').text(filename || "Choose File");
    });

    $('#upload-btn').on('click', function() {
        var file = $('#todo-file').prop('files')[0];
        if (!file) return alert("Select a file!");

        var reader = new FileReader();
        reader.readAsDataURL(file);
        
        $("#upload-status").text("Uploading...").show();

        reader.onload = function () {
            var base64Data = reader.result.split(',')[1];
            var payload = {
                base64: base64Data,
                type: file.type,
                name: file.name
            };

            $.ajax({
                url: 'https://script.google.com/macros/s/AKfycbw2XHqsIbJ9Wn00F8zkc9-4HFWsLIgocIqWAVWf-Z-vN4KX26XZ-dNqaOZcqeSWjcVe/exec', // Paste your Apps Script URL
                type: 'POST',
                contentType: 'text/plain', // Apps Script requires this for CORS
                data: JSON.stringify(payload),
                success: function(res) {
                    if(res.result === 'success') {
                        $("#upload-status").html("✅ Success! <a href='"+res.view_url+"' target='_blank'>View File</a>");
                    } else {
                        $("#upload-status").text("❌ Error: " + res.error);
                    }
                },
                error: function() {
                    $("#upload-status").text("❌ Upload failed. Check permissions.");
                }
            });
        };
    });
});
</script>
</body>
</html>
