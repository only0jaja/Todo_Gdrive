<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thumb Tasks</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="header-content">
                <div class="header-title">
                    <div class="icon-circle"><i class="fas fa-clock"></i></div>
                    <div>
                        <h1>Thumb Tasks</h1>
                        <p>Task Scheduler & Drive Sync</p>
                    </div>
                </div>
                <button class="drive-badge" id="authBtn">
                    <i class="fab fa-google-drive"></i>
                    <span id="statusLabel">Connect Drive</span>
                </button>
            </div>
        </div>

        <div class="add-todo">
            <button class="plus-icon" id="add-btn">
                <i class="fas fa-plus"></i>
            </button>
            <div class="todo-input-container">
                <i class="fas fa-pencil-alt"></i>
                <input type="text" id="todo-input" placeholder="What needs to be done?">
            </div>
        </div>

        <div class="todo-list" id="todo-list">
            <!-- Tasks will appear here -->
        </div>

        <div class="drive-section">
            <div class="drive-card">
                <div class="drive-title">
                    <i class="fab fa-google-drive"></i>
                    <h3>Cloud Destination</h3>
                </div>

                <div class="option-tabs">
                    <div class="option-tab active" id="tabRoot">
                        <i class="fas fa-cloud"></i> My Drive
                    </div>
                    <div class="option-tab" id="tabFolderId">
                        <i class="fas fa-folder"></i> Folder ID
                    </div>
                </div>

                <div class="folder-input-group" id="folderIdGroup">
                    <div class="input-wrapper">
                        <i class="fas fa-folder-open"></i>
                        <input type="text" id="folderId" placeholder="Enter Google Folder ID">
                    </div>
                </div>
                
                <div class="file-upload-area" id="fileZone">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p id="fileName">Select file to upload</p>
                    <input type="file" id="filePicker" hidden>
                </div>

                <button class="btn-primary" id="uploadBtn">
                    <i class="fas fa-upload"></i> Upload
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
